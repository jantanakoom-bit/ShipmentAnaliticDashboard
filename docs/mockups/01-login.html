<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShipTrack — Login (Mockup)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #0f766e;
    --accent-light: #ccfbf1;
    --text: #17201f;
    --text-muted: #76827f;
    --border: #dde4e3;
    --surface: #ffffff;
    --surface2: #f7f8f8;
  }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: "DM Sans", sans-serif; min-height: 100vh; display: grid; place-items: center; }

  /* Atmospheric background */
  .auth-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(15,118,110,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(37,99,235,0.05) 0%, transparent 40%),
      radial-gradient(ellipse at 60% 80%, rgba(15,118,110,0.06) 0%, transparent 45%),
      linear-gradient(90deg, rgba(15,118,110,0.03) 1px, transparent 1px),
      linear-gradient(0deg, rgba(15,118,110,0.025) 1px, transparent 1px),
      #ffffff;
    background-size: 100% 100%, 100% 100%, 100% 100%, 48px 48px, 48px 48px;
  }

  .auth-card {
    position: relative; z-index: 1;
    width: min(440px, calc(100% - 32px));
    padding: 36px 32px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 24px 64px rgba(23,32,31,0.10), 0 1px 2px rgba(23,32,31,0.04);
  }

  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .brand-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #0f766e, #134e4a);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 15px; font-weight: 900;
    box-shadow: 0 4px 12px rgba(15,118,110,0.3);
  }
  .brand-name { font-size: 17px; font-weight: 800; color: var(--text); line-height: 1.2; }
  .brand-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .auth-title { font-size: 28px; letter-spacing: -0.03em; margin-bottom: 6px; color: var(--text); }
  .auth-copy { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .form-input {
    width: 100%; padding: 12px 14px; border: 1px solid var(--border);
    border-radius: 12px; background: var(--surface2); color: var(--text);
    font-size: 14px; font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15,118,110,0.12); }

  .remember-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .remember-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); cursor: pointer; }
  .remember-label input { accent-color: var(--accent); width: 16px; height: 16px; }
  .forgot-link { font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 600; }

  .btn-primary {
    width: 100%; padding: 13px; border: 0; border-radius: 12px;
    background: linear-gradient(135deg, #0f766e, #115e59);
    color: #fff; font-size: 14px; font-weight: 800; font-family: inherit;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(15,118,110,0.25);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(15,118,110,0.3); }
  .btn-primary:active { transform: translateY(0); }

  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-muted); font-size: 11px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  .demo-hint { text-align: center; font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .demo-hint strong { color: var(--text); }

  /* Mockup nav */
  .mock-nav { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
    padding: 8px 16px; background: rgba(15,23,42,0.9); backdrop-filter: blur(8px);
    border-radius: 12px; display: flex; gap: 8px; font-size: 11px; }
  .mock-nav a { color: #94a3b8; text-decoration: none; padding: 4px 10px; border-radius: 6px; transition: all 0.15s; }
  .mock-nav a:hover, .mock-nav a.active { color: #fff; background: rgba(255,255,255,0.1); }
  .mock-nav a.active { background: var(--accent); }
</style>
</head>
<body>
<div class="auth-bg"></div>
<div class="auth-card">
  <div class="brand">
    <div class="brand-icon">ST</div>
    <div>
      <div class="brand-name">ShipTrack</div>
      <div class="brand-sub">Logistics Intelligence</div>
    </div>
  </div>
  <h1 class="auth-title">Access dashboard</h1>
  <p class="auth-copy">Sign in to review shipment movement and logistics analytics.</p>
  <form onsubmit="event.preventDefault();">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" placeholder="Enter username" value="admin">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" placeholder="Enter password" value="••••••••">
    </div>
    <div class="remember-row">
      <label class="remember-label">
        <input type="checkbox" checked> Remember me
      </label>
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>
    <button class="btn-primary" type="submit">Sign in</button>
  </form>
  <div class="divider">mockup preview</div>
  <div class="demo-hint">
    Demo credentials: <strong>admin</strong> / <strong>password</strong><br>
    <a href="02-dashboard.html" style="color:var(--accent);font-weight:700;">Skip to Dashboard →</a>
  </div>
</div>

<div class="mock-nav">
  <a href="index.html">Index</a>
  <a href="01-login.html" class="active">Login</a>
  <a href="02-dashboard.html">Dashboard</a>
  <a href="03-analytics.html">Analytics</a>
  <a href="04-shipments.html">Shipments</a>
  <a href="05-admin.html">Admin</a>
</div>
</body>
</html>
